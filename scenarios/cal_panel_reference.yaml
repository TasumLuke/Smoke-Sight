# Reference calibration panel: a target with known reflectance and
# emissivity at a known temperature. Used to verify *absolute* radiance
# accuracy, i.e. that the gain coefficient maps DN to W m-2 sr-1 um-1
# correctly. Without a panel measurement the pipeline still works, but
# you can only trust the *relative* tau values (the L / L0 ratio
# cancels gain), not the absolute radiance numbers.
#
# This file is a placeholder until a real panel measurement is bundled
# with the test data. Real panel data should be referenced via a
# DOI-cited dataset; see CONTRIBUTING.md for how to add one.

name: cal_panel_reference
description: Reference calibration panel data for absolute radiance tests

panel:
  reflectance: 0.99
  temperature_K: 293.15
  emissivity: 0.95

expected_radiance: 12.4   # W m-2 sr-1 um-1, integrated over the sensor band
tolerance: 0.05           # +/- 5% on the recovered absolute radiance
