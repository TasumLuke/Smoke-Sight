name: CI

on:
  push:
    branches: [main, quack]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # 3.8 is the package floor; 3.10 + 3.11 catch regressions on newer
        # interpreters. 3.9 is implicit (covered by 3.10's stricter mypy).
        python-version: ["3.8", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: black --check
        run: black --check smokesight tests

      - name: isort --check-only
        run: isort --check-only smokesight tests

      - name: flake8
        run: flake8 smokesight tests --max-line-length=88 --extend-ignore=E203,W503

      # mypy needs python_version >= 3.9 for its analysis baseline, so we only
      # run it on the newer matrix entries. Pure-Python 3.8 runtime support is
      # still enforced by the rest of the matrix.
      - name: mypy --strict
        if: matrix.python-version != '3.8'
        run: mypy smokesight

      - name: pytest with coverage gate
        run: pytest --cov=smokesight --cov-report=xml --cov-fail-under=90

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
